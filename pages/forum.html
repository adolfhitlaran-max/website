<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Uncensored Media forum." />
  <title>Forum | Uncensored Media</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../styles/access-gate.css" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #050607;
      --panel: rgba(15, 18, 20, 0.88);
      --panel-soft: rgba(245, 239, 226, 0.055);
      --text: #f5efe2;
      --muted: #b8b7ae;
      --line: rgba(245, 239, 226, 0.15);
      --red: #e5242a;
      --cyan: #00d5ff;
      --amber: #ffb83d;
      --green: #8fff6f;
      --radius: 8px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100svh;
      background:
        linear-gradient(130deg, rgba(229, 36, 42, 0.14), transparent 30rem),
        linear-gradient(300deg, rgba(0, 213, 255, 0.12), transparent 30rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font: inherit; }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      min-height: 4.5rem;
      border-bottom: 1px solid var(--line);
      padding: 0 max(1rem, calc((100vw - var(--max)) / 2));
      background: rgba(5, 6, 7, 0.84);
      backdrop-filter: blur(16px);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .brand-mark {
      width: 2rem;
      height: 2rem;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--red), rgba(0, 213, 255, 0.72));
      font-size: 0.76rem;
      font-weight: 950;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 0.35rem;
    }

    .nav a {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 0.5rem 0.78rem;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 850;
    }

    .nav a:hover,
    .nav a.active {
      border-color: var(--line);
      background: rgba(245, 239, 226, 0.08);
      color: white;
    }

    main {
      width: min(var(--max), calc(100% - 2rem));
      margin: 0 auto;
      padding: 3rem 0;
    }

    h1, h2, h3, p { margin-top: 0; }

    .page-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      margin: 0 0 0.65rem;
      color: var(--amber);
      font-size: 0.78rem;
      font-weight: 950;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 2.5rem;
      height: 2px;
      background: linear-gradient(90deg, var(--red), var(--cyan));
    }

    h1 {
      margin-bottom: 0;
      font-size: clamp(3.4rem, 9vw, 7rem);
      line-height: 0.86;
      text-transform: uppercase;
    }

    .notice {
      min-height: 3rem;
      border: 1px solid rgba(255, 184, 61, 0.32);
      border-radius: var(--radius);
      padding: 0.75rem;
      margin-bottom: 1rem;
      background: rgba(255, 184, 61, 0.08);
      color: rgba(245, 239, 226, 0.86);
      font-weight: 750;
    }

    .notice.ok {
      border-color: rgba(143, 255, 111, 0.38);
      background: rgba(143, 255, 111, 0.08);
    }

    .notice.error {
      border-color: rgba(229, 36, 42, 0.52);
      background: rgba(229, 36, 42, 0.1);
      color: #ffd8d8;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(18rem, 0.35fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .panel,
    .post-card,
    .thread-panel,
    .comment-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.22);
    }

    .panel,
    .thread-panel {
      padding: 1rem;
    }

    .panel h2,
    .thread-panel h2 {
      margin-bottom: 0.8rem;
      font-size: 1.55rem;
      line-height: 1;
      text-transform: uppercase;
    }

    .user-strip,
    .author-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .user-strip {
      border: 1px solid rgba(245, 239, 226, 0.12);
      border-radius: var(--radius);
      padding: 0.85rem;
      margin-bottom: 1rem;
      background: rgba(5, 6, 7, 0.52);
    }

    .avatar,
    .avatar-fallback {
      width: 2.75rem;
      height: 2.75rem;
      flex: 0 0 auto;
      border: 1px solid rgba(245, 239, 226, 0.18);
      border-radius: 50%;
      background: #111417;
      object-fit: cover;
    }

    .avatar-fallback {
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(229, 36, 42, 0.82), rgba(0, 213, 255, 0.68));
      color: white;
      font-size: 0.82rem;
      font-weight: 950;
    }

    .identity {
      min-width: 0;
      display: grid;
      gap: 0.08rem;
    }

    .identity strong,
    .identity span {
      overflow-wrap: anywhere;
    }

    .identity span,
    .meta,
    .muted {
      color: var(--muted);
      font-size: 0.86rem;
    }

    form {
      display: grid;
      gap: 0.75rem;
    }

    label {
      display: grid;
      gap: 0.38rem;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(245, 239, 226, 0.16);
      border-radius: var(--radius);
      padding: 0.85rem;
      background: rgba(5, 6, 7, 0.68);
      color: var(--text);
      outline: none;
    }

    input,
    select { min-height: 3.1rem; }
    textarea { min-height: 9rem; resize: vertical; }

    input:focus,
    textarea:focus {
      border-color: rgba(0, 213, 255, 0.55);
    }

    button,
    .button {
      min-height: 3rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(245, 239, 226, 0.18);
      border-radius: 999px;
      padding: 0.75rem 1rem;
      background: rgba(245, 239, 226, 0.08);
      color: var(--text);
      font-weight: 950;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .primary {
      border-color: transparent;
      background: var(--text);
      color: var(--bg);
    }

    .forum-main {
      display: grid;
      gap: 1rem;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.55rem;
      text-transform: uppercase;
    }

    .thread-layout {
      display: grid;
      grid-template-columns: minmax(20rem, 0.56fr) minmax(0, 1fr);
      gap: 1rem;
      align-items: start;
    }

    .post-list,
    .comment-list {
      display: grid;
      gap: 0.8rem;
    }

    .post-card {
      width: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: 4.1rem minmax(0, 1fr);
      gap: 0.8rem;
      padding: 0.85rem;
      text-align: left;
      border-radius: var(--radius);
      cursor: pointer;
    }

    .post-card:hover,
    .post-card:focus-visible,
    .post-card.active {
      border-color: rgba(0, 213, 255, 0.5);
      background: rgba(245, 239, 226, 0.08);
      outline: none;
    }

    .thread-rail {
      display: grid;
      align-content: start;
      justify-items: center;
      gap: 0.35rem;
      border-right: 1px solid rgba(245, 239, 226, 0.1);
      padding-right: 0.65rem;
      color: var(--muted);
      text-align: center;
    }

    .thread-rail strong {
      color: var(--cyan);
      font-size: 1.25rem;
      line-height: 1;
    }

    .thread-rail span {
      font-size: 0.68rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .post-content {
      min-width: 0;
      display: grid;
      gap: 0.55rem;
    }

    .post-subline {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
    }

    .post-card h3 {
      margin-bottom: 0;
      color: white;
      font-size: 1.18rem;
      line-height: 1.16;
    }

    .preview,
    .thread-body,
    .comment-body {
      color: rgba(245, 239, 226, 0.8);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .preview {
      display: -webkit-box;
      margin-bottom: 0;
      overflow: hidden;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
    }

    .post-footer,
    .thread-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 800;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(245, 239, 226, 0.13);
      border-radius: 999px;
      padding: 0.25rem 0.52rem;
      background: var(--panel-soft);
      color: var(--cyan);
      font-size: 0.76rem;
      font-weight: 950;
    }

    .open-hint {
      color: var(--amber);
      font-size: 0.78rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .thread-panel {
      min-height: 24rem;
    }

    .thread-title {
      margin: 1rem 0 0.6rem;
      color: white;
      font-size: clamp(2rem, 5vw, 3.6rem);
      line-height: 0.95;
      overflow-wrap: anywhere;
    }

    .thread-body {
      margin-bottom: 1rem;
      font-size: 1rem;
    }

    .comment-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-top: 1px solid var(--line);
      padding-top: 1rem;
      margin-top: 1rem;
    }

    .comment-card {
      padding: 0.85rem;
      box-shadow: none;
      border-left: 3px solid rgba(0, 213, 255, 0.42);
    }

    .comment-body {
      margin: 0.65rem 0 0;
    }

    .empty {
      border: 1px dashed rgba(245, 239, 226, 0.22);
      border-radius: var(--radius);
      padding: 1rem;
      color: var(--muted);
      background: rgba(245, 239, 226, 0.04);
    }

    .form-note {
      min-height: 1.5rem;
      margin: 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    @media (max-width: 980px) {
      .topbar,
      .workspace,
      .thread-layout,
      .page-head {
        display: grid;
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .nav {
        justify-content: start;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="../index.html">
      <span class="brand-mark">UM</span>
      <span>Uncensored Media</span>
    </a>
    <nav class="nav" aria-label="Primary">
      <a href="../Divided%20by%20Year/">Speeches</a>
      <a href="./pdfs.html">PDFs</a>
      <a class="active" href="./forum.html">Forum</a>
      <a href="./live.html">Live</a>
      <a href="./chat.html">Chat</a>
      <a href="../ai.html">AI Lab</a>
      <a href="../games/">Games</a>
      <a href="./profile.html">Profile</a>
      <a href="./login.html" data-auth-link>Login</a>
    </nav>
  </header>

  <main>
    <section class="page-head">
      <div>
        <p class="eyebrow">Community</p>
        <h1>Forum</h1>
      </div>
      <a class="button" href="./profile.html">Profile</a>
    </section>

    <div id="message" class="notice">Loading forum...</div>

    <section class="workspace">
      <aside class="panel">
        <p class="eyebrow">Post As</p>
        <div class="user-strip">
          <div id="profileAvatar"></div>
          <div class="identity">
            <strong id="profileName">Signed out</strong>
            <span id="profileDetail">Log in and create a profile before posting.</span>
          </div>
        </div>

        <h2>Create Thread</h2>
        <form id="postForm">
          <label>Title <input id="postTitle" type="text" maxlength="120" required /></label>
          <label>Body <textarea id="postBody" maxlength="4000" required></textarea></label>
          <button class="primary" type="submit">Publish Thread</button>
        </form>
      </aside>

      <section class="forum-main">
        <div class="toolbar">
          <h2>Threads</h2>
          <label style="min-width: 12rem;">Sort
            <select id="sortMode">
              <option value="new">Newest</option>
              <option value="comments">Most Comments</option>
              <option value="old">Oldest</option>
            </select>
          </label>
          <button id="refreshBtn" type="button">Refresh</button>
        </div>

        <div class="thread-layout">
          <div id="postList" class="post-list" aria-live="polite"></div>

          <article id="postDetail" class="thread-panel" aria-live="polite">
            <div id="detailPlaceholder" class="empty">Open a post to read the thread.</div>
            <div id="detailContent" hidden>
              <div class="author-row">
                <div id="detailAvatar"></div>
                <div id="detailIdentity" class="identity">
                  <strong id="detailAuthor">Anonymous</strong>
                  <span id="detailUsername">@anonymous</span>
                </div>
              </div>

              <h2 id="detailTitle" class="thread-title">Thread</h2>
              <div id="detailMeta" class="thread-meta"></div>
              <p id="detailBody" class="thread-body"></p>

              <div class="comment-header">
                <h2>Comments</h2>
                <span id="detailCommentCount" class="pill">0 comments</span>
              </div>
              <div id="commentList" class="comment-list"></div>

              <form id="commentForm" style="margin-top: 1rem;">
                <label>Comment <textarea id="commentBody" maxlength="2000" required></textarea></label>
                <p id="commentNote" class="form-note"></p>
                <button class="primary" type="submit">Add Comment</button>
              </form>
            </div>
          </article>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"></script>
  <script type="module" src="../js/supabaseClient.js"></script>
  <script type="module" src="../scripts/access-gate.js"></script>
  <script type="module" src="../js/forum.js"></script>
  <script src="../js/authNav.js"></script>
  <script src="../js/ai-widget.js" defer></script>
</body>
</html>
