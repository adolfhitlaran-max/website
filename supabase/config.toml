
[functions.chat]
enabled = true
# Security: AI endpoints require a Supabase user JWT, then the function checks profiles.access_granted.
verify_jwt = true
import_map = "./functions/chat/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/chat/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/chat/*.html" ]

[functions.ai-chat]
enabled = true
# Security: keep private AI behind the Edge Function; never expose Ollama/provider URLs to browser JS.
verify_jwt = true
import_map = "./functions/ai-chat/deno.json"
entrypoint = "./functions/ai-chat/index.ts"

[functions.ai-image]
enabled = true
# Security: Hugging Face tokens stay in Supabase secrets/env only.
verify_jwt = true
import_map = "./functions/ai-image/deno.json"
entrypoint = "./functions/ai-image/index.ts"

[functions.ai-music]
enabled = true
# Security: local MusicGen URLs must be HTTPS tunnel/proxy URLs, not direct LAN/home IPs.
verify_jwt = true
import_map = "./functions/ai-music/deno.json"
entrypoint = "./functions/ai-music/index.ts"
